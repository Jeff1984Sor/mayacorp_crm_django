{% extends "base.html" %}
{% block titulo %}Login Admin{% endblock %}
{% block conteudo %}
<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-100 via-white to-blue-100">
    <form method="post" class="w-full max-w-md rounded-[2rem] bg-white p-8 shadow-2xl border border-white/70">
        {% csrf_token %}
        <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Admin Central</p>
        <h1 class="mt-3 text-3xl font-semibold">Entrar</h1>
        <div class="mt-8 space-y-4">
            {% for campo in formulario %}
            <div>
                <label class="mb-2 block text-sm font-medium">{{ campo.label }}</label>
                {{ campo }}
                {% if campo.errors %}<p class="text-sm text-red-600">{{ campo.errors|join:", " }}</p>{% endif %}
            </div>
            {% endfor %}
        </div>
        <button class="mt-6 w-full rounded-2xl bg-blue-600 px-5 py-3 text-white">Acessar painel</button>
    </form>
</div>
{% endblock %}
