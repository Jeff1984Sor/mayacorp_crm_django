<div class="flex flex-wrap gap-2 border-b border-slate-200 pb-4">
    {% for chave, rotulo in abas %}
    <a href="?aba={{ chave }}"
       hx-get="?aba={{ chave }}"
       hx-target="{{ alvo_hx|default:'#detalhe-conteudo' }}"
       hx-push-url="true"
       class="rounded-2xl px-4 py-2 text-sm font-medium {% if aba_atual == chave %}bg-slate-900 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">
        {{ rotulo }}
    </a>
    {% endfor %}
</div>
