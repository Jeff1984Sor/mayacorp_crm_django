{% if valor == True or valor == 'ATIVA' or valor == 'ATIVO' or valor == 'FECHADA' or valor == 'CLIENTE' %}
<span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-medium text-emerald-700">{{ texto|default:valor }}</span>
{% elif valor == False or valor == 'CANCELADA' or valor == 'PERDIDO' %}
<span class="rounded-full bg-rose-100 px-3 py-1 text-xs font-medium text-rose-700">{{ texto|default:valor }}</span>
{% else %}
<span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700">{{ texto|default:valor }}</span>
{% endif %}
